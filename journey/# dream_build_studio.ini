# dream_build_studio

## Project: Screen Golf POS (For Parents' Store)

엔지니어 아들이 부모님 매장을 위해 POS를 직접 만든다.  
이 프로젝트는 단순한 사이드 프로젝트가 아니라,  
실제 운영 중인 매장의 문제를 해결하기 위한 실전 빌드 기록이다.

목표는 거창하지 않다.

- 기록한다.
- 개선한다.
- 필요하다면 확장한다.

---

# 📌 Project Background

부모님이 운영하시는 스크린골프 매장에서 기존 POS 사용 중.

문제점:

- 결제 과정이 복잡함 (버튼 여러 번 클릭)
- 피크 시간에 병목 발생
- 카드 수수료 부담
- UX가 직관적이지 않음
- 정산 과정이 번거로움

그래서 직접 만들기로 결정.

---

# 🎯 Project Goal

1. 결제 플로우 단순화
2. 직원 실수 최소화
3. 카드 수수료 구조 최적화
4. 정산 데이터 자동화
5. 실제 매장에서 사용 가능한 안정성 확보

---

# 🧱 Build Philosophy

이 프로젝트는 다음 원칙을 따른다:

- 실전 문제 기반 개발
- 기술보다 운영 효율 우선
- 부모님이 쓰기 쉬운 UX
- 완벽보다 개선

