# Production release compose using pre-built images from CI (no local builds on server)
services:
  db:
    image: postgres:16
    container_name: konegolf-postgres
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "10"
    environment:
      POSTGRES_USER: kgolf
      POSTGRES_PASSWORD: kgolf_password
      POSTGRES_DB: kgolf_app
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - konegolf_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kgolf -d kgolf_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/hankyungsung/kgolf-backend:${IMAGE_TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.production
  # DATABASE_URL comes from .env.production; no explicit environment block needed
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
    networks:
      - konegolf_net

  seed:
    image: ghcr.io/hankyungsung/kgolf-backend:${IMAGE_TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env.production
    # Seed runs in production mode (skips test users and mock bookings)
    # Set SEED_ADMIN_EMAIL, SEED_ADMIN_PASSWORD in .env.production to customize
    command: ["node", "dist/prisma/seed.js"]
    restart: "no"
    networks:
      - konegolf_net

  backend:
    image: ghcr.io/hankyungsung/kgolf-backend:${IMAGE_TAG:-latest}
    container_name: konegolf-backend
    logging:
      driver: json-file
      options:
        max-size: "15m"
        max-file: "10"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed:
        condition: service_completed_successfully
    env_file:
      - .env.production
  # All runtime vars (including NODE_ENV, PORT) provided via .env.production
    ports:
      - "8082:8080"
    volumes:
      - score_uploads:/app/uploads
      - /var/log/kgolf:/app/logs
      - ./gdrive-key.json:/app/gdrive-key.json:ro
    networks:
      - konegolf_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  ocr:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
    container_name: konegolf-ocr
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - konegolf_net
    # Not exposed to host — only reachable from backend via Docker network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

networks:
  konegolf_net:
    driver: bridge

volumes:
  pg_data:
    driver: local
  score_uploads:
    driver: local
